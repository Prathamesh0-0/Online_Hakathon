services:
  # Python Backend Service
  - type: web
    name: meeting-copilot-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Render will prompt you to enter your Supabase URL
      - key: REDIS_URL
        fromService:
          type: redis
          name: meeting-copilot-redis
          property: connectionString
      - key: QDRANT_URL
        sync: false # Render will prompt you to enter your Qdrant Cloud URL
      - key: QDRANT_API_KEY
        sync: false # Render will prompt you to enter your Qdrant Cloud API Key
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # Frontend static web site
  - type: web
    name: meeting-copilot-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: meeting-copilot-backend
          property: host

  # Redis cache/pub-sub (Required for FastAPI socket gateway)
  - type: redis
    name: meeting-copilot-redis
    plan: free
    ipAllowList: []
